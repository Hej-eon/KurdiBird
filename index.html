<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdiBird</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

canvas{
    display:block;
}

#fullscreenBtn{
    position:fixed;
    right:15px;
    bottom:15px;

    padding:12px 20px;

    border:none;
    border-radius:10px;

    background:#007bff;
    color:white;

    font-weight:bold;

    z-index:1000;
}

</style>
</head>
<body>

<canvas id="game"></canvas>

<button id="fullscreenBtn">
⛶ Full Screen
</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

}

resizeCanvas();

window.addEventListener(
    "resize",
    resizeCanvas
);

// ====================
// GAME DATA
// ====================

const bird = {
    x:120,
    y:300,
    width:40,
    height:30,
    velocity:0
};

const gravity = 0.5;
const jumpForce = -9;

let score = 0;
let pipes = [];

let gameStarted = false;
let gameOver = false;

const restartButton = {
    x:0,
    y:0,
    width:180,
    height:60
};

// ====================
// BACKGROUND
// ====================

let cloudOffset = 0;
let mountainOffset = 0;

// ====================
// PIPES
// ====================

function createPipe(){

    const gap = 200;

    const topHeight =
        Math.random() *
        (canvas.height * 0.35)
        + 60;

    pipes.push({
        x:canvas.width,
        width:90,
        top:topHeight,
        bottom:topHeight + gap,
        passed:false
    });

}

setInterval(()=>{

    if(gameStarted && !gameOver){
        createPipe();
    }

},2200);

// ====================
// RESET
// ====================

function resetGame(){

    bird.y = canvas.height / 2;
    bird.velocity = 0;

    score = 0;

    pipes = [];

    gameOver = false;
    gameStarted = true;

}

// ====================
// UPDATE
// ====================

function update(){

    if(!gameStarted || gameOver){
        return;
    }

    cloudOffset += 0.4;
    mountainOffset += 1;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    if(bird.y < 0){
        bird.y = 0;
    }

    if(
        bird.y + bird.height >
        canvas.height - 80
    ){
        gameOver = true;
    }

    pipes.forEach(pipe=>{

        pipe.x -= 4;

        const hit =

            bird.x + bird.width > pipe.x &&
            bird.x < pipe.x + pipe.width &&
            (
                bird.y < pipe.top ||
                bird.y + bird.height >
                pipe.bottom
            );

        if(hit){
            gameOver = true;
        }

        if(
            !pipe.passed &&
            pipe.x < bird.x
        ){
            pipe.passed = true;
            score++;
        }

    });

    pipes = pipes.filter(
        pipe=>pipe.x > -pipe.width
    );

}

// ====================
// SKY
// ====================

function drawSky(){

    const gradient =
        ctx.createLinearGradient(
            0,
            0,
            0,
            canvas.height
        );

    gradient.addColorStop(
        0,
        "#74d4ff"
    );

    gradient.addColorStop(
        1,
        "#d9f7ff"
    );

    ctx.fillStyle = gradient;

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

}

// ====================
// CLOUDS
// ====================

function drawClouds(){

    ctx.fillStyle =
        "rgba(255,255,255,0.8)";

    for(let i=0;i<8;i++){

        const x =
            ((i * 250) -
            (cloudOffset %
             (canvas.width + 250)));

        const y =
            50 +
            Math.sin(i) * 60;

        ctx.beginPath();

        ctx.arc(
            x,
            y,
            25,
            0,
            Math.PI*2
        );

        ctx.arc(
            x+25,
            y-10,
            30,
            0,
            Math.PI*2
        );

        ctx.arc(
            x+55,
            y,
            25,
            0,
            Math.PI*2
        );

        ctx.fill();

    }

}

// ====================
// MOUNTAINS
// ====================

function drawMountains(){

    ctx.fillStyle = "#7e91a8";

    for(let i=0;i<12;i++){

        const x =
            ((i*220) -
            (mountainOffset %
             220));

        ctx.beginPath();

        ctx.moveTo(
            x,
            canvas.height - 80
        );

        ctx.lineTo(
            x + 110,
            canvas.height - 280
        );

        ctx.lineTo(
            x + 220,
            canvas.height - 80
        );

        ctx.fill();

    }

}

// ====================
// GROUND
// ====================

function drawGround(){

    ctx.fillStyle =
        "#6ab04c";

    ctx.fillRect(
        0,
        canvas.height - 80,
        canvas.width,
        80
    );

}

// ====================
// BIRD
// ====================

function drawBird(){

    const flap =
        Math.sin(
            Date.now()/100
        ) * 5;

    // body

    ctx.fillStyle =
        "#ffdd00";

    ctx.beginPath();

    ctx.ellipse(
        bird.x,
        bird.y,
        20,
        15,
        0,
        0,
        Math.PI*2
    );

    ctx.fill();

    // wing

    ctx.fillStyle =
        "#ffbb00";

    ctx.beginPath();

    ctx.ellipse(
        bird.x - 5,
        bird.y + flap,
        10,
        8,
        0,
        0,
        Math.PI*2
    );

    ctx.fill();

    // eye

    ctx.fillStyle="white";

    ctx.beginPath();

    ctx.arc(
        bird.x+8,
        bird.y-3,
        5,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle="black";

    ctx.beginPath();

    ctx.arc(
        bird.x+9,
        bird.y-3,
        2,
        0,
        Math.PI*2
    );

    ctx.fill();

    // beak

    ctx.fillStyle =
        "orange";

    ctx.beginPath();

    ctx.moveTo(
        bird.x+18,
        bird.y
    );

    ctx.lineTo(
        bird.x+30,
        bird.y-3
    );

    ctx.lineTo(
        bird.x+18,
        bird.y+5
    );

    ctx.fill();

}

// ====================
// PIPES
// ====================

function drawPipes(){

    pipes.forEach(pipe=>{

        const gradient =
            ctx.createLinearGradient(
                pipe.x,
                0,
                pipe.x+pipe.width,
                0
            );

        gradient.addColorStop(
            0,
            "#34d058"
        );

        gradient.addColorStop(
            1,
            "#248f3d"
        );

        ctx.fillStyle = gradient;

        ctx.fillRect(
            pipe.x,
            0,
            pipe.width,
            pipe.top
        );

        ctx.fillRect(
            pipe.x,
            pipe.bottom,
            pipe.width,
            canvas.height
        );

    });

}

// ====================
// SCORE
// ====================

function drawScore(){

    ctx.fillStyle = "black";

    ctx.font =
        "bold 32px Arial";

    ctx.fillText(
        "Score: " + score,
        20,
        50
    );

}

// ====================
// START SCREEN
// ====================

function drawStartScreen(){

    ctx.fillStyle =
        "rgba(255,255,255,0.9)";

    ctx.fillRect(
        canvas.width/2-180,
        canvas.height/2-120,
        360,
        220
    );

    ctx.fillStyle =
        "black";

    ctx.font =
        "bold 48px Arial";

    ctx.fillText(
        "KurdiBird",
        canvas.width/2-120,
        canvas.height/2-30
    );

    ctx.font =
        "22px Arial";

    ctx.fillText(
        "Tap or Press SPACE",
        canvas.width/2-110,
        canvas.height/2+25
    );

    ctx.fillText(
        "to Start",
        canvas.width/2-40,
        canvas.height/2+65
    );

}

// ====================
// GAME OVER
// ====================

function drawGameOver(){

    restartButton.x =
        canvas.width/2-90;

    restartButton.y =
        canvas.height/2+80;

    ctx.fillStyle =
        "rgba(255,255,255,0.95)";

    ctx.fillRect(
        canvas.width/2-200,
        canvas.height/2-160,
        400,
        330
    );

    ctx.fillStyle="red";

    ctx.font =
        "bold 46px Arial";

    ctx.fillText(
        "GAME OVER",
        canvas.width/2-155,
        canvas.height/2-60
    );

    ctx.fillStyle="black";

    ctx.font =
        "30px Arial";

    ctx.fillText(
        "Score: " + score,
        canvas.width/2-60,
        canvas.height/2
    );

    ctx.fillStyle =
        "#007bff";

    ctx.fillRect(
        restartButton.x,
        restartButton.y,
        restartButton.width,
        restartButton.height
    );

    ctx.fillStyle =
        "white";

    ctx.font =
        "26px Arial";

    ctx.fillText(
        "Restart",
        restartButton.x+42,
        restartButton.y+38
    );

}

// ====================
// DRAW
// ====================

function draw(){

    drawSky();

    drawClouds();

    drawMountains();

    drawPipes();

    drawGround();

    drawBird();

    drawScore();

    if(!gameStarted){
        drawStartScreen();
    }

    if(gameOver){
        drawGameOver();
    }

}

// ====================
// LOOP
// ====================

function loop(){

    update();
    draw();

    requestAnimationFrame(
        loop
    );

}

loop();

// ====================
// CONTROLS
// ====================

function flap(){

    if(!gameStarted){

        gameStarted = true;

    }

    if(!gameOver){

        bird.velocity =
            jumpForce;

    }

}

document.addEventListener(
    "keydown",
    e=>{

        if(e.code==="Space"){

            flap();

        }

    }
);

function handleRestart(x,y){

    if(!gameOver)
        return false;

    return(

        x > restartButton.x &&
        x <
        restartButton.x +
        restartButton.width &&

        y > restartButton.y &&
        y <
        restartButton.y +
        restartButton.height

    );

}

canvas.addEventListener(
    "click",
    e=>{

        const rect =
            canvas.getBoundingClientRect();

        const x =
            e.clientX - rect.left;

        const y =
            e.clientY - rect.top;

        if(handleRestart(x,y)){

            resetGame();
            return;

        }

        flap();

    }
);

canvas.addEventListener(
    "touchstart",
    e=>{

        e.preventDefault();

        const touch =
            e.touches[0];

        const rect =
            canvas.getBoundingClientRect();

        const x =
            touch.clientX - rect.left;

        const y =
            touch.clientY - rect.top;

        if(handleRestart(x,y)){

            resetGame();
            return;

        }

        flap();

    }
);

// ====================
// FULLSCREEN
// ====================

document
.getElementById(
"fullscreenBtn"
)
.addEventListener(
"click",
async()=>{

if(!document.fullscreenElement){

await document
.documentElement
.requestFullscreen();

}

}
);

</script>

</body>
</html>
