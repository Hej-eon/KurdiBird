<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdiBird</title>

<link rel="iconrel="apple-touch-iconcolor" content="#74d4ff">

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

canvas{
    display:block;
}

#fullscreenBtn{
    position:fixed;
    bottom:15px;
    right:15px;

    padding:12px 20px;

    border:none;
    border-radius:12px;

    background:#007bff;
    color:white;

    font-weight:bold;
    cursor:pointer;

    z-index:999;
}

</style>
</head>
<body>

<canvas id="game"></canvas>

<button id="fullscreenBtn">
⛶ Full Screen
</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ------------------------
// GAME
// ------------------------

const bird = {
    x:120,
    y:300,
    width:40,
    height:30,
    velocity:0
};

const gravity = 0.5;
const jumpForce = -9;

let score = 0;

let highScore =
    Number(
        localStorage.getItem(
            "kurdibirdHighScore"
        )
    ) || 0;

let gameStarted = false;
let gameOver = false;
let pipes = [];

let cloudOffset = 0;
let mountainOffset = 0;

const restartButton = {
    x:0,
    y:0,
    width:180,
    height:60
};

// ------------------------
// PIPES
// ------------------------

function createPipe(){

    const gap = 200;

    const topHeight =
        Math.random() *
        (canvas.height * 0.35)
        + 60;

    pipes.push({
        x:canvas.width,
        width:90,
        top:topHeight,
        bottom:topHeight + gap,
        passed:false
    });
}

setInterval(()=>{

    if(gameStarted && !gameOver){
        createPipe();
    }

},2200);

// ------------------------
// RESET
// ------------------------

function resetGame(){

    bird.y = canvas.height / 2;
    bird.velocity = 0;

    pipes = [];
    score = 0;

    gameOver = false;
    gameStarted = true;
}

// ------------------------
// UPDATE
// ------------------------

function update(){

    cloudOffset += 0.35;
    mountainOffset += 1;

    if(!gameStarted || gameOver){
        return;
    }

    bird.velocity += gravity;
    bird.y += bird.velocity;

    if(bird.y < 0){
        bird.y = 0;
    }

    if(bird.y + bird.height > canvas.height - 80){

        gameOver = true;

        if(score > highScore){

            highScore = score;

            localStorage.setItem(
                "kurdibirdHighScore",
                highScore
            );

        }
    }

    pipes.forEach(pipe=>{

        pipe.x -= 4;

        const collision =

            bird.x + bird.width > pipe.x &&
            bird.x < pipe.x + pipe.width &&

            (
                bird.y < pipe.top ||
                bird.y + bird.height >
                pipe.bottom
            );

        if(collision){

            gameOver = true;

            if(score > highScore){

                highScore = score;

                localStorage.setItem(
                    "kurdibirdHighScore",
                    highScore
                );
            }
        }

        if(
            !pipe.passed &&
            pipe.x < bird.x
        ){
            pipe.passed = true;
            score++;
        }

    });

    pipes = pipes.filter(
        p=>p.x > -p.width
    );
}

// ------------------------
// SKY
// ------------------------

function drawSky(){

    const g =
    ctx.createLinearGradient(
        0,0,0,canvas.height
    );

    g.addColorStop(0,"#72d5ff");
    g.addColorStop(1,"#e5f8ff");

    ctx.fillStyle = g;

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

// ------------------------
// CLOUDS
// ------------------------

function drawClouds(){

    ctx.fillStyle =
        "rgba(255,255,255,0.85)";

    for(let i=0;i<8;i++){

        const x =
        (i*250) -
        (cloudOffset %
        (canvas.width+250));

        const y =
        70 +
        Math.sin(i)*55;

        ctx.beginPath();
        ctx.arc(x,y,25,0,Math.PI*2);
        ctx.arc(x+25,y-10,30,0,Math.PI*2);
        ctx.arc(x+55,y,25,0,Math.PI*2);
        ctx.fill();
    }
}

// ------------------------
// MOUNTAINS
// ------------------------

function drawMountains(){

    ctx.fillStyle = "#8090a6";

    for(let i=0;i<12;i++){

        const x =
        (i*220) -
        (mountainOffset % 220);

        ctx.beginPath();

        ctx.moveTo(
            x,
            canvas.height-80
        );

        ctx.lineTo(
            x+110,
            canvas.height-280
        );

        ctx.lineTo(
            x+220,
            canvas.height-80
        );

        ctx.fill();
    }
}

// ------------------------
// GROUND
// ------------------------

function drawGround(){

    ctx.fillStyle = "#5cb85c";

    ctx.fillRect(
        0,
        canvas.height-80,
        canvas.width,
        80
    );
}

// ------------------------
// BIRD
// ------------------------

function drawBird(){

    const flap =
    Math.sin(Date.now()/100)*5;

    ctx.fillStyle =
        "#ffdd00";

    ctx.beginPath();

    ctx.ellipse(
        bird.x,
        bird.y,
        20,
        15,
        0,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle =
        "#ffbb00";

    ctx.beginPath();

    ctx.ellipse(
        bird.x-5,
        bird.y+flap,
        10,
        8,
        0,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle="white";

    ctx.beginPath();

    ctx.arc(
        bird.x+8,
        bird.y-3,
        5,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle="black";

    ctx.beginPath();

    ctx.arc(
        bird.x+9,
        bird.y-3,
        2,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle="orange";

    ctx.beginPath();

    ctx.moveTo(
        bird.x+18,
        bird.y
    );

    ctx.lineTo(
        bird.x+30,
        bird.y-4
    );

    ctx.lineTo(
        bird.x+18,
        bird.y+5
    );

    ctx.fill();
}

// ------------------------
// PIPES
// ------------------------

function drawPipes(){

    pipes.forEach(pipe=>{

        const g =
        ctx.createLinearGradient(
            pipe.x,
            0,
            pipe.x + pipe.width,
            0
        );

        g.addColorStop(
            0,
            "#46e46a"
        );

        g.addColorStop(
            1,
            "#228b3f"
        );

        ctx.fillStyle = g;

        ctx.fillRect(
            pipe.x,
            0,
            pipe.width,
            pipe.top
        );

        ctx.fillRect(
            pipe.x,
            pipe.bottom,
            pipe.width,
            canvas.height
        );
    });
}

// ------------------------
// SCORE
// ------------------------

function drawScore(){

    if(!gameStarted) return;

    ctx.fillStyle="black";

    ctx.font=
    "bold 32px Arial";

    ctx.fillText(
        "Score: " + score,
        20,
        50
    );
}

// ------------------------
// START SCREEN
// ------------------------

function drawStartScreen(){

    ctx.fillStyle =
        "rgba(0,0,0,0.25)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const floatY =
    Math.sin(
        Date.now()/300
    ) * 15;

    ctx.save();

    ctx.translate(
        canvas.width/2,
        canvas.height/2 - 180 + floatY
    );

    ctx.fillStyle="#ffdd00";

    ctx.beginPath();

    ctx.ellipse(
        0,
        0,
        35,
        25,
        0,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle="orange";

    ctx.beginPath();
    ctx.moveTo(30,0);
    ctx.lineTo(50,-5);
    ctx.lineTo(30,8);
    ctx.fill();

    ctx.restore();

    ctx.textAlign="center";

    ctx.fillStyle="white";

    ctx.font="bold 64px Arial";

    ctx.fillText(
        "KURDIBIRD",
        canvas.width/2,
        canvas.height/2 - 60
    );

    ctx.font="24px Arial";

    ctx.fillText(
        "Fly Through The Mountains",
        canvas.width/2,
        canvas.height/2 - 10
    );

    const btnWidth = 260;
    const btnHeight = 70;

    const btnX =
    canvas.width/2 -
    btnWidth/2;

    const btnY =
    canvas.height/2 + 45;

    ctx.fillStyle =
    "#2ecc71";

    ctx.beginPath();

    ctx.roundRect(
        btnX,
        btnY,
        btnWidth,
        btnHeight,
        15
    );

    ctx.fill();

    ctx.fillStyle="white";

    ctx.font=
    "bold 32px Arial";

    ctx.fillText(
        "PLAY NOW ▶",
        canvas.width/2,
        btnY + 47
    );

    ctx.font="22px Arial";

    ctx.fillText(
        "High Score: " + highScore,
        canvas.width/2,
        btnY + 115
    );

    ctx.textAlign="left";
}

// ------------------------
// GAME OVER
// ------------------------

function drawGameOver(){

    restartButton.x =
    canvas.width/2 - 90;

    restartButton.y =
    canvas.height/2 + 90;

    ctx.fillStyle =
    "rgba(255,255,255,0.95)";

    ctx.fillRect(
        canvas.width/2-210,
        canvas.height/2-170,
        420,
        340
    );

    ctx.fillStyle="red";

    ctx.font=
    "bold 48px Arial";

    ctx.fillText(
        "GAME OVER",
        canvas.width/2-155,
        canvas.height/2-70
    );

    ctx.fillStyle="black";

    ctx.font=
    "30px Arial";

    ctx.fillText(
        "Score: " + score,
        canvas.width/2-60,
        canvas.height/2-10
    );

    ctx.fillText(
        "Best: " + highScore,
        canvas.width/2-55,
        canvas.height/2+40
    );

    ctx.fillStyle="#007bff";

    ctx.fillRect(
        restartButton.x,
        restartButton.y,
        restartButton.width,
        restartButton.height
    );

    ctx.fillStyle="white";

    ctx.font="26px Arial";

    ctx.fillText(
        "Restart",
        restartButton.x+42,
        restartButton.y+38
    );
}

// ------------------------
// DRAW
// ------------------------

function draw(){

    drawSky();
    drawClouds();
    drawMountains();
    drawPipes();
    drawGround();
    drawBird();
    drawScore();

    if(!gameStarted){
        drawStartScreen();
    }

    if(gameOver){
        drawGameOver();
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

// ------------------------
// CONTROLS
// ------------------------

function flap(){

    if(!gameStarted){
        gameStarted = true;
    }

    if(!gameOver){
        bird.velocity = jumpForce;
    }
}

document.addEventListener(
    "keydown",
    e=>{
        if(e.code==="Space"){
            flap();
        }
    }
);

function handleRestart(x,y){

    if(!gameOver) return false;

    return (

        x > restartButton.x &&
        x < restartButton.x + restartButton.width &&

        y > restartButton.y &&
        y < restartButton.y + restartButton.height
    );
}

canvas.addEventListener(
    "click",
    e=>{

        const rect =
        canvas.getBoundingClientRect();

        const x =
        e.clientX - rect.left;

        const y =
        e.clientY - rect.top;

        if(handleRestart(x,y)){
            resetGame();
            return;
        }

        flap();
    }
);

canvas.addEventListener(
    "touchstart",
    e=>{

        e.preventDefault();

        const touch =
        e.touches[0];

        const rect =
        canvas.getBoundingClientRect();

        const x =
        touch.clientX - rect.left;

        const y =
        touch.clientY - rect.top;

        if(handleRestart(x,y)){
            resetGame();
            return;
        }

        flap();
    }
);

// ------------------------
// FULLSCREEN
// ------------------------

document
.getElementById(
    "fullscreenBtn"
)
.addEventListener(
    "click",
    async()=>{

        if(
            !document.fullscreenElement
        ){
            await document
            .documentElement
            .requestFullscreen();
        }
    }
);

</script>

</body>
</html>
