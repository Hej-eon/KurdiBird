<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdiBird</title>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#70c5ce;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    display:block;
    background:#70c5ce;
}

#fullscreenBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:1000;

    padding:12px 20px;

    border:none;
    border-radius:10px;

    background:#007bff;
    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<button id="fullscreenBtn">
⛶ Full Screen
</button>

<script>

// CANVAS

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

}

resizeCanvas();

window.addEventListener(
    "resize",
    resizeCanvas
);

// BIRD

const bird = {
    x:100,
    y:window.innerHeight/2,
    width:35,
    height:35,
    velocity:0
};

const gravity = 0.5;
const jumpForce = -9;

// GAME

let pipes = [];
let score = 0;

let gameStarted = false;
let gameOver = false;

// RESTART BUTTON

const restartButton = {
    x:0,
    y:0,
    width:180,
    height:60
};

// CREATE PIPES

function createPipe(){

    const gap = 180;

    const topHeight =
        Math.random() *
        (canvas.height * 0.4)
        + 50;

    pipes.push({
        x:canvas.width,
        width:80,
        top:topHeight,
        bottom:topHeight + gap,
        passed:false
    });

}

setInterval(()=>{

    if(gameStarted && !gameOver){
        createPipe();
    }

},2000);

// RESET GAME

function resetGame(){

    bird.y = canvas.height / 2;
    bird.velocity = 0;

    score = 0;

    pipes = [];

    gameOver = false;
    gameStarted = true;

}

// UPDATE

function update(){

    if(!gameStarted) return;
    if(gameOver) return;

    bird.velocity += gravity;

    bird.y += bird.velocity;

    if(bird.y < 0){

        bird.y = 0;

    }

    if(
        bird.y + bird.height >
        canvas.height
    ){
        gameOver = true;
    }

    pipes.forEach(pipe=>{

        pipe.x -= 4;

        const collision =

            bird.x + bird.width > pipe.x &&
            bird.x < pipe.x + pipe.width &&

            (
                bird.y < pipe.top ||
                bird.y + bird.height >
                pipe.bottom
            );

        if(collision){
            gameOver = true;
        }

        if(
            !pipe.passed &&
            pipe.x < bird.x
        ){
            pipe.passed = true;
            score++;
        }

    });

    pipes = pipes.filter(
        pipe => pipe.x > -pipe.width
    );

}

// DRAW

function drawBackground(){

    ctx.fillStyle = "#70c5ce";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

}

function drawBird(){

    ctx.fillStyle = "yellow";

    ctx.fillRect(
        bird.x,
        bird.y,
        bird.width,
        bird.height
    );

}

function drawPipes(){

    ctx.fillStyle = "green";

    pipes.forEach(pipe=>{

        ctx.fillRect(
            pipe.x,
            0,
            pipe.width,
            pipe.top
        );

        ctx.fillRect(
            pipe.x,
            pipe.bottom,
            pipe.width,
            canvas.height - pipe.bottom
        );

    });

}

function drawScore(){

    ctx.fillStyle = "black";
    ctx.font = "30px Arial";

    ctx.fillText(
        "Score: " + score,
        20,
        45
    );

}

function drawStartScreen(){

    ctx.fillStyle =
        "rgba(255,255,255,0.9)";

    ctx.fillRect(
        canvas.width/2 - 180,
        canvas.height/2 - 120,
        360,
        240
    );

    ctx.fillStyle = "black";

    ctx.font = "50px Arial";

    ctx.fillText(
        "KurdiBird",
        canvas.width/2 - 120,
        canvas.height/2 - 30
    );

    ctx.font = "24px Arial";

    ctx.fillText(
        "Tap, Click or SPACE",
        canvas.width/2 - 120,
        canvas.height/2 + 30
    );

    ctx.fillText(
        "to Start",
        canvas.width/2 - 40,
        canvas.height/2 + 70
    );

}

function drawGameOver(){

    restartButton.x =
        canvas.width/2 -
        restartButton.width/2;

    restartButton.y =
        canvas.height/2 + 70;

    ctx.fillStyle =
        "rgba(255,255,255,0.95)";

    ctx.fillRect(
        canvas.width/2 - 200,
        canvas.height/2 - 150,
        400,
        320
    );

    ctx.fillStyle = "red";

    ctx.font = "48px Arial";

    ctx.fillText(
        "GAME OVER",
        canvas.width/2 - 160,
        canvas.height/2 - 50
    );

    ctx.fillStyle = "black";

    ctx.font = "30px Arial";

    ctx.fillText(
        "Score: " + score,
        canvas.width/2 - 70,
        canvas.height/2
    );

    ctx.fillStyle = "#007bff";

    ctx.fillRect(
        restartButton.x,
        restartButton.y,
        restartButton.width,
        restartButton.height
    );

    ctx.fillStyle = "white";

    ctx.font = "26px Arial";

    ctx.fillText(
        "Restart",
        restartButton.x + 40,
        restartButton.y + 38
    );

}

function draw(){

    drawBackground();

    drawPipes();

    drawBird();

    drawScore();

    if(!gameStarted){

        drawStartScreen();

    }

    if(gameOver){

        drawGameOver();

    }

}

// LOOP

function gameLoop(){

    update();

    draw();

    requestAnimationFrame(gameLoop);

}

gameLoop();

// FLAP

function flap(){

    if(!gameStarted){

        gameStarted = true;

    }

    if(!gameOver){

        bird.velocity = jumpForce;

    }

}

// KEYBOARD

document.addEventListener(
    "keydown",
    e=>{

        if(e.code === "Space"){

            flap();

        }

    }
);

// CLICK

canvas.addEventListener(
    "click",
    e=>{

        if(gameOver){

            const rect =
                canvas.getBoundingClientRect();

            const x =
                e.clientX - rect.left;

            const y =
                e.clientY - rect.top;

            if(

                x > restartButton.x &&
                x < restartButton.x +
                restartButton.width &&

                y > restartButton.y &&
                y < restartButton.y +
                restartButton.height

            ){

                resetGame();

                return;

            }

        }

        flap();

    }
);

// TOUCH

canvas.addEventListener(
    "touchstart",
    e=>{

        e.preventDefault();

        if(gameOver){

            const touch =
                e.touches[0];

            const rect =
                canvas.getBoundingClientRect();

            const x =
                touch.clientX - rect.left;

            const y =
                touch.clientY - rect.top;

            if(

                x > restartButton.x &&
                x < restartButton.x +
                restartButton.width &&

                y > restartButton.y &&
                y < restartButton.y +
                restartButton.height

            ){

                resetGame();

                return;

            }

        }

        flap();

    }
);

// FULLSCREEN

const fullscreenBtn =
    document.getElementById(
        "fullscreenBtn"
    );

fullscreenBtn.addEventListener(
    "click",
    async()=>{

        if(
            !document.fullscreenElement
        ){

            await document
                .documentElement
                .requestFullscreen();

        }

    }
);

</script>

</body>
</html>
